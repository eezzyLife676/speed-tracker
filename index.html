<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DriveTrack</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Arial, sans-serif;
  background:#000;
  color:#fff;
  overflow:hidden;
}

#map {
  position:absolute;
  width:100%;
  height:100%;
}

/* TOP STATS */
.top {
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.7);
  padding:10px 20px;
  border-radius:20px;
  display:flex;
  gap:20px;
  z-index:1000;
  font-size:14px;
}

/* MENU BUTTON */
#menuBtn {
  position:absolute;
  bottom:20px;
  left:20px;
  z-index:2000;
  width:55px;
  height:55px;
  border-radius:12px;
  border:none;
  background:rgba(0,0,0,0.8);
  color:white;
  font-size:24px;
}

/* MENU PANEL */
#menu {
  position:absolute;
  bottom:90px;
  left:20px;
  background:#111;
  padding:15px;
  border-radius:15px;
  display:none;
  z-index:2000;
}

#menu button {
  display:block;
  margin:5px 0;
  padding:10px;
  width:120px;
  border:none;
  border-radius:8px;
}

/* BIG SPEED */
.speed-big {
  position:absolute;
  bottom:20px;
  right:20px;
  font-size:60px;
  color:#00f0ff;
  z-index:1000;
}
</style>
</head>

<body>

<div id="map"></div>

<!-- TOP STATS -->
<div class="top">
  <div>MPH: <span id="speed">0</span></div>
  <div>Miles: <span id="distance">0</span></div>
  <div>FS: <span id="fs">0</span></div>
</div>

<div class="speed-big" id="speedBig">0</div>

<!-- MENU BUTTON -->
<button id="menuBtn">[</button>

<!-- MENU -->
<div id="menu">
  <button onclick="startTrack()">Start</button>
  <button onclick="stopTrack()">Stop</button>
  <button onclick="saveTrack()">Save</button>
  <button onclick="loadTrack()">Load</button>
</div>

<script>
let map = L.map('map').setView([51.5, -0.1], 15);

L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom:19
}).addTo(map);

let marker;
let lastPosition = null;
let totalDistance = 0;

let track = [];
let isTracking = false;
let fastestSpeed = 0;
let loadedLine = null;

let wakeLock = null;

// smoothing
let speedBuffer = [];
const NOISE_THRESHOLD = 0.008;

// MENU toggle
document.getElementById("menuBtn").onclick = () => {
  const m = document.getElementById("menu");
  m.style.display = (m.style.display === "block") ? "none" : "block";
};

// GPS
navigator.geolocation.watchPosition(updatePos, err => console.log(err), {
  enableHighAccuracy:true,
  maximumAge:0
});

function updatePos(pos) {
  const { latitude, longitude, speed } = pos.coords;

  let mph = speed ? speed * 2.23694 : 0;

  // smooth speed
  speedBuffer.push(mph);
  if (speedBuffer.length > 5) speedBuffer.shift();
  let smoothSpeed = speedBuffer.reduce((a,b)=>a+b,0)/speedBuffer.length;

  if (smoothSpeed > fastestSpeed) fastestSpeed = smoothSpeed;

  document.getElementById("speed").textContent = Math.round(smoothSpeed);
  document.getElementById("speedBig").textContent = Math.round(smoothSpeed);
  document.getElementById("fs").textContent = Math.round(fastestSpeed);

  // distance
  if (lastPosition) {
    const dist = getDistance(
      lastPosition.lat, lastPosition.lng,
      latitude, longitude
    );

    if (dist > NOISE_THRESHOLD && smoothSpeed > 1) {
      totalDistance += dist;
    }
  }

  document.getElementById("distance").textContent = totalDistance.toFixed(2);

  lastPosition = { lat: latitude, lng: longitude };

  if (isTracking) track.push([latitude, longitude]);

  if (!marker) {
    marker = L.marker([latitude, longitude]).addTo(map);
    map.setView([latitude, longitude], 17);
  } else {
    marker.setLatLng([latitude, longitude]);
  }
}

// distance formula
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 3958.8;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;

  const a = Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)**2;

  return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// TRACK
function startTrack() {
  track = [];
  totalDistance = 0;
  fastestSpeed = 0;
  isTracking = true;
  keepScreenOn();
}

function stopTrack() {
  isTracking = false;

  if (wakeLock) {
    wakeLock.release();
    wakeLock = null;
  }
}

function saveTrack() {
  localStorage.setItem("track", JSON.stringify(track));
  alert("Saved!");
}

function loadTrack() {
  const data = localStorage.getItem("track");
  if (!data) return alert("No track");

  const coords = JSON.parse(data);

  if (loadedLine) map.removeLayer(loadedLine);

  loadedLine = L.polyline(coords, {
    color:"lime",
    weight:5
  }).addTo(map);

  map.fitBounds(loadedLine.getBounds());
}

// WAKE LOCK
async function keepScreenOn() {
  try {
    wakeLock = await navigator.wakeLock.request('screen');
  } catch(e) {
    console.log("WakeLock failed");
  }
}
</script>

</body>
</html>
