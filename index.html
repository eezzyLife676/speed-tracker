<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DriveTrack</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto;
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* MAP */
#map {
  position:absolute;
  width:100%;
  height:100%;
}

/* MAIN UI */
.ui {
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
  z-index:1000;
}

/* BIG SPEED */
.speed {
  font-size:80px;
  font-weight:700;
  color:#00f0ff;
  line-height:1;
}

.unit {
  font-size:16px;
  color:#aaa;
  margin-top:-5px;
}

/* SMALL STATS */
.stats {
  margin-top:10px;
  display:flex;
  justify-content:center;
  gap:30px;
  font-size:16px;
}

.stat {
  text-align:center;
}

.label {
  font-size:12px;
  color:#888;
}

/* START OVERLAY */
#startOverlay {
  position:absolute;
  top:0; left:0;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:2000;
  font-size:22px;
}
</style>
</head>

<body>

<div id="map"></div>

<!-- UI -->
<div class="ui">
  <div class="speed" id="speed">0</div>
  <div class="unit">MPH</div>

  <div class="stats">
    <div class="stat">
      <div id="distance">0.0</div>
      <div class="label">MILES</div>
    </div>
    <div class="stat">
      <div id="fs">0</div>
      <div class="label">FS</div>
    </div>
  </div>
</div>

<!-- TAP TO START -->
<div id="startOverlay">Tap to Start</div>

<script>
let map = L.map('map').setView([51.5, -0.1], 15);

L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom:19
}).addTo(map);

let marker;
let lastPosition = null;
let totalDistance = 0;
let fastestSpeed = 0;
let speedBuffer = [];

let wakeLock = null;
const NOISE_THRESHOLD = 0.008;

// START APP
document.getElementById("startOverlay").onclick = () => {
  document.getElementById("startOverlay").style.display = "none";
  startTracking();
};

// GPS START
function startTracking() {
  keepScreenOn();

  navigator.geolocation.watchPosition(updatePos, err => console.log(err), {
    enableHighAccuracy:true,
    maximumAge:0
  });
}

// UPDATE POSITION
function updatePos(pos) {
  const { latitude, longitude, speed } = pos.coords;

  let mph = speed ? speed * 2.23694 : 0;

  // smooth speed
  speedBuffer.push(mph);
  if (speedBuffer.length > 5) speedBuffer.shift();
  let smoothSpeed = speedBuffer.reduce((a,b)=>a+b,0)/speedBuffer.length;

  if (smoothSpeed > fastestSpeed) fastestSpeed = smoothSpeed;

  document.getElementById("speed").textContent = Math.round(smoothSpeed);
  document.getElementById("fs").textContent = Math.round(fastestSpeed);

  // distance
  if (lastPosition) {
    const dist = getDistance(
      lastPosition.lat, lastPosition.lng,
      latitude, longitude
    );

    if (dist > NOISE_THRESHOLD && smoothSpeed > 1) {
      totalDistance += dist;
    }
  }

  document.getElementById("distance").textContent = totalDistance.toFixed(2);

  lastPosition = { lat: latitude, lng: longitude };

  // marker
  if (!marker) {
    marker = L.marker([latitude, longitude]).addTo(map);
    map.setView([latitude, longitude], 17);
  } else {
    marker.setLatLng([latitude, longitude]);
  }
}

// DISTANCE
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 3958.8;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;

  const a = Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)**2;

  return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// WAKE LOCK
async function keepScreenOn() {
  try {
    wakeLock = await navigator.wakeLock.request('screen');
  } catch(e) {}
}
</script>

</body>
</html>
