<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DriveTrack</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      color: white;
      overflow: hidden;
      height: 100vh;
      touch-action: none;
    }

    #map {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }

    .top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 55px;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      align-items: center;
      padding: 0 20px;
      z-index: 1000;
      backdrop-filter: blur(12px);
    }

    .logo { font-size: 22px; font-weight: bold; }
    .logo span { color: #00f0ff; }

    .status { margin-left: auto; font-size: 16px; }

    .overlay-bottom {
      position: absolute;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 10, 15, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 20px 40px;
      width: 92%;
      max-width: 380px;
      text-align: center;
      z-index: 1000;
      border: 1px solid rgba(0, 240, 255, 0.3);
    }

    .speed-big {
      font-size: 5rem;
      font-weight: 700;
      color: #00f0ff;
    }

    .unit { font-size: 1rem; color: #ccc; }

    .small-stats {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 12px;
      font-size: 1rem;
    }

    .controls {
      position: absolute;
      right: 15px;
      top: 70px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .control-btn {
      width: 56px;
      height: 56px;
      background: rgba(0,0,0,0.8);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 50%;
      color: white;
      font-size: 24px;
      cursor: pointer;
    }

    .start-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2000;
      background: #00f0ff;
      color: black;
      padding: 16px 32px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: bold;
      border: none;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div class="top-bar">
  <div class="logo"><span>▶</span> DriveTrack</div>
  <div class="status" id="time"></div>
</div>

<div class="overlay-bottom">
  <div class="speed-big" id="speed">0</div>
  <div class="unit">MPH</div>

  <div class="small-stats">
    <div><span id="avg-speed">0</span> AVG</div>
    <div><span id="distance">0.0</span> miles</div>
  </div>
</div>

<div class="controls">
  <div class="control-btn" onclick="map.zoomIn()">+</div>
  <div class="control-btn" onclick="map.zoomOut()">−</div>
  <div class="control-btn" onclick="centerMap()">⟲</div>
</div>

<button id="startBtn" class="start-btn">Start Tracking</button>

<script>
let map, marker;
let lastPosition = null;
let totalDistance = 0;
let speeds = [];
let watchId = null;

const NOISE_THRESHOLD = 0.008; // ~40 meters (filters GPS drift)

function initMap() {
  map = L.map('map', { zoomControl: false }).setView([51.7520, -1.2577], 15);

  L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { maxZoom: 19 }
  ).addTo(map);
}

function startTracking() {
  document.getElementById("startBtn").style.display = "none";

  watchId = navigator.geolocation.watchPosition(
    updatePosition,
    error => console.log(error),
    {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 5000
    }
  );
}

function updatePosition(pos) {
  const { latitude, longitude, speed } = pos.coords;

  let mph = speed ? speed * 2.23694 : 0;

  // Smooth speed
  speeds.push(mph);
  if (speeds.length > 20) speeds.shift();
  let avgSpeed = speeds.reduce((a,b)=>a+b,0)/speeds.length;

  document.getElementById("speed").textContent = Math.round(mph);
  document.getElementById("avg-speed").textContent = Math.round(avgSpeed);

  // Distance calculation with noise filter
  if (lastPosition) {
    const dist = getDistance(
      lastPosition.lat,
      lastPosition.lng,
      latitude,
      longitude
    );

    // 🚫 FILTER: ignore GPS jitter when stationary
    if (dist > NOISE_THRESHOLD && mph > 1) {
      totalDistance += dist;
    }
  }

  document.getElementById("distance").textContent = totalDistance.toFixed(2);

  lastPosition = { lat: latitude, lng: longitude };

  // Marker
  if (!marker) {
    marker = L.marker([latitude, longitude]).addTo(map);
    map.setView([latitude, longitude], 17);
  } else {
    marker.setLatLng([latitude, longitude]);
  }
}

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 3958.8;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)**2;

  return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function centerMap() {
  if (lastPosition) {
    map.setView([lastPosition.lat, lastPosition.lng], 17);
  }
}

function updateClock() {
  document.getElementById("time").textContent =
    new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

document.getElementById("startBtn").addEventListener("click", startTracking);

initMap();
updateClock();
setInterval(updateClock, 1000);
</script>

</body>
</html>
